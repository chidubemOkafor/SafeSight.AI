services:
  safesight-api:
    build:
      context: ./SafeSight_server
      dockerfile: Dockerfile
    container_name: safesight-api
    env_file:
      - ./SafeSight_server/.env
    environment:
      PORT: 7860
      ULTRALYTICS_CONFIG_DIR: /app/.ultralytics
    ports:
      - "7860:7860"
    volumes:
      - ./SafeSight_server/storage:/app/storage
      - ./SafeSight_server/frames:/app/frames
      - ./SafeSight_server/events:/app/events
      - ./SafeSight_server/models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  safesight-client:
    build:
      context: ./SafeSight_client
      dockerfile: Dockerfile
      args:
        # Browser-side var — must be the address the user's browser can reach the API on.
        # Override with: NEXT_PUBLIC_API_BASE_URL=http://<your-server-ip>:7860 docker compose up
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:7860}
    container_name: safesight-client
    ports:
      - "3000:3000"
    depends_on:
      safesight-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    restart: unless-stopped
